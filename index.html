// ── LIVE PRICE via Yahoo Finance + CORS proxy ───────────────
async function fetchLivePrice(ticker) {
  const YAHOO = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}`;
  const PROXIES = [
    `https://corsproxy.io/?${YAHOO}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(YAHOO)}`,
    `https://thingproxy.freeboard.io/fetch/${YAHOO}`,
  ];
  function parseResult(json) {
    const result = json?.chart?.result?.[0];
    if (!result) return null;
    const price = result.meta.regularMarketPrice;
    if (!price) return null;
    const prev = result.meta.chartPreviousClose || result.meta.previousClose;
    const chgPct = prev ? ((price - prev) / prev * 100) : 0;
    const raw = result.meta.longName || result.meta.shortName || ticker;
    const name = raw.replace(/,?\s*(Inc\.?|Corp\.?|Ltd\.?|LLC\.?|PLC\.?|N\.V\.?|S\.A\.?)$/gi,'').trim();
    return {
      name,
      price: `$${price.toFixed(2)}`,
      change: `${chgPct >= 0 ? '+' : ''}${chgPct.toFixed(2)}%`
    };
  }
  for (const url of PROXIES) {
    try {
      const resp = await fetch(url, { signal: AbortSignal.timeout(7000) });
      if (!resp.ok) continue;
      const json = await resp.json();
      const parsed = parseResult(json);
      if (parsed) return parsed;
    } catch(e) {
      continue;
    }
  }
  return null;
}

function drawScoreScreen(ticker,data,t){
  const eop=(s,e)=>Math.max(0,Math.min(1,(t-s)/(e-s)));

        sc.shadowColor='#e63030';sc.shadowBlur=6;sc.globalAlpha=recA*strikeP;
        sc.beginPath();

    if(data.rec==='BUY'){
      const ckP=eeo(eop(0.5,1.2));
      if(ckP>0){
        const ckX=36+sc.measureText('BUY').width+10;
        const ckY=101;
        const ckS=14;
        const lx=ckX-ckS*0.4,ly=ckY,mx=ckX-ckS*0.05,my=ckY+ckS*0.42,rx=ckX+ckS*0.55,ry=ckY-ckS*0.38;
        const p1=Math.min(ckP/0.4,1),p2=Math.max((ckP-0.4)/0.6,0);
        sc.strokeStyle='#1a8a3a';sc.lineWidth=2.8;sc.lineCap='round';sc.lineJoin='round';

  const labels=['S','I','G','N','A','L','+'],vals=[data.s,data.i,data.g,data.n,data.a,data.l,data.plus];
  const names=['Surge 200%+','In Consolidation','Growth Confirmed','No Red Flags','Catalyst Dated','Levels & Macro','Vol + Short'];
  const startY=200,rowH=32;

  const divY=startY+7*rowH+4;

    sc.lineWidth=3;

      const y=cy+Math.sin(angle)*ry;
