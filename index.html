async function fetchLiveStockData(ticker) {
  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 300,
        tools: [{ "type": "web_search_20250305", "name": "web_search" }],
        system: "You are a stock data lookup tool. Your ONLY job is to return a JSON object. No markdown. No explanation. No code fences. Just raw JSON.",
        messages: [{
          role: "user",
          content: `Search for current stock price of ${ticker.toUpperCase()} and return ONLY this exact JSON with no other text: {"name":"Official Company Name Without Inc Corp Ltd","price":"$000.00","change":"+0.0%"}`
        }]
      })
    });
    const json = await response.json();
    const textBlocks = (json.content || []).filter(b => b.type === 'text');
    const rawText = textBlocks.map(b => b.text).join('');
    const match = rawText.match(/\{[^}]+\}/);
    if (match) {
      const parsed = JSON.parse(match[0]);
      if (parsed.name && parsed.price) return parsed;
    }
  } catch(e) {
    console.warn('Live fetch error:', e);
  }
  return null;
}

function scoreFromTicker(ticker) {
  const t = ticker.toUpperCase();
  if (KNOWN[t]) return KNOWN[t];

  // Seed-based for unknown tickers
  // FIX: name is just the ticker symbol — live fetch will replace it
  let seed = 0;
  for (const c of t) seed += c.charCodeAt(0);
  const r = (n) => ((Math.sin(seed * n) * 43758.5) % 1 + 1) / 2;
  const score = Math.round((4 + r(1) * 6) * 2) / 2;
  const checkpoints = [
    r(2)>0.5?1.5:r(2)>0.25?1.0:0.5,
    r(3)>0.5?1.5:r(3)>0.25?1.0:0.0,
    r(4)>0.5?1.5:r(4)>0.25?1.0:0.5,
    r(5)>0.6?1.5:r(5)>0.3?1.0:0.5,
    r(6)>0.5?1.5:r(6)>0.25?1.0:0.0,
    r(7)>0.5?1.0:0.5,
    r(8)>0.5?1.0:0.5
  ];
  const pct = Math.round(r(9)*400+50);
  const shortPct = Math.round(r(10)*40+2);
  const floatN = Math.round(r(11)*900+10);
  const revM = Math.round(r(14)*500+10);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const earningsDate = `${months[Math.floor(r(15)*12)]} ${Math.floor(r(16)*27)+1}, 2026`;
  const recIdx = score>=8?0:score>=6?1:2;
  const recs = ['BUY','HOLD','PASS'];
  const verdicts = ['WATCH — BUILDING PATTERN','PASS — THESIS UNCLEAR','WATCHLIST CANDIDATE','SIGNAL WEAK — MONITOR','APPROACHING ENTRY ZONE'];
  const cols = ['#1a8a3a','#886600','#cc4400'];

  return {
    name: t,            // FIX: just the ticker — live fetch overwrites with real name
    price: 'Loading…',  // FIX: live fetch will replace with real price
    change: '—',
    score, s:checkpoints[0], i:checkpoints[1], g:checkpoints[2], n:checkpoints[3],
    a:checkpoints[4], l:checkpoints[5], plus:checkpoints[6],
    surge: `+${pct}%`, short: `${shortPct}%`, float: `${floatN}M`,
    revenue: `$${revM}M TTM`, earnings: earningsDate,
    rec: recs[recIdx], verdict: verdicts[Math.floor(r(17)*verdicts.length)],
    col: cols[recIdx]
  };
}

// ─── COMMERCIAL CANVAS ────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let startTime = null, raf = null;
window._fireT = null;

function pr(t,s,e){return Math.max(0,Math.min(1,(t-s)/(e-s)));}
function eo(t){return 1-Math.pow(1-t,3);}
function eio(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function lerp(a,b,t){return a+(b-a)*t;}
function sn(x,s){return ((Math.sin(x*127.1+s*311.7)*43758.5)%1+1)/2;}

function drawBG(){
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,BG_TOP); grad.addColorStop(1,BG_BOT);
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=RULE; ctx.lineWidth=0.5;
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

function surgeY(xf){
  if(xf<0.12)return 0.82+xf*0.08; if(xf<0.25)return 0.83-(xf-0.12)*0.35;
  if(xf<0.36)return 0.78-(xf-0.25)*0.15; if(xf<0.41)return 0.77+(xf-0.36)*0.4;
  if(xf<0.54)return 0.79-(xf-0.41)*1.6; if(xf<0.64)return 0.58-(xf-0.54)*2.6;
  if(xf<0.71)return 0.32-(xf-0.64)*0.8; if(xf<0.78)return 0.26+(xf-0.71)*0.28;
  if(xf<0.86)return 0.28-(xf-0.78)*0.4; return 0.25-(xf-0.86)*0.15;
}
function sy(xf){return surgeY(xf)*H;}

function drawLine(progress,alpha){
  if(progress<=0||alpha<=0)return;
  const steps=300,drawn=Math.floor(steps*progress);
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.moveTo(28,H);
  for(let i=0;i<=drawn;i++){const xf=i/steps,x=28+xf*(W-72),y=sy(xf);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  const lxf=drawn/steps;
  ctx.lineTo(28+lxf*(W-72),H);ctx.lineTo(28,H);ctx.closePath();
  const fill=ctx.createLinearGradient(0,H*0.2,0,H);
  fill.addColorStop(0,'rgba(26,138,58,0.08)');fill.addColorStop(1,'rgba(26,138,58,0.01)');
  ctx.fillStyle=fill;ctx.fill();
  ctx.strokeStyle=GREEN;ctx.lineWidth=2.2;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.shadowColor='rgba(26,138,58,0.2)';ctx.shadowBlur=5;
  ctx.beginPath();
  for(let i=0;i<=drawn;i++){const xf=i/steps,x=28+xf*(W-72),y=sy(xf)+(sn(i*0.25,1)-0.5)*0.8;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.stroke();ctx.shadowBlur=0;
  if(progress<0.99){const txf=drawn/steps,tx=28+txf*(W-72),ty=sy(txf);ctx.fillStyle=GREEN;ctx.shadowColor=GREEN;ctx.shadowBlur=8;ctx.beginPath();ctx.arc(tx,ty,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  ctx.restore();
}

function drawRisingBar(lineProgress,lineAlpha){
  if(lineProgress<=0||lineAlpha<=0)return;
  const steps=300,drawn=Math.floor(steps*lineProgress);
  const tipXF=drawn/steps,tipY=sy(tipXF);
  const barBottom=H,barTop=tipY,barH=barBottom-barTop;
  if(barH<=0)return;
  ctx.save();
  const barGrad=ctx.createLinearGradient(0,barTop,0,barBottom);
  barGrad.addColorStop(0,`rgba(26,138,58,${0.10*lineAlpha})`);
  barGrad.addColorStop(1,`rgba(26,138,58,${0.01*lineAlpha})`);
  ctx.fillStyle=barGrad;ctx.fillRect(BAR_X-3,barTop,6,barH);
  ctx.strokeStyle=GREEN;ctx.lineWidth=1;ctx.globalAlpha=lineAlpha*0.18;
  ctx.shadowColor=GREEN;ctx.shadowBlur=4;
  ctx.beginPath();ctx.moveTo(BAR_X,barTop);ctx.lineTo(BAR_X,barBottom);ctx.stroke();ctx.shadowBlur=0;
  const pencilTipX=28+tipXF*(W-72);
  const distToMeet=BAR_X-pencilTipX;
  const ballAlpha=Math.min(distToMeet/40,1);
  if(ballAlpha>0){
    ctx.globalAlpha=lineAlpha*0.9*ballAlpha;ctx.fillStyle=GREEN;ctx.shadowColor=GREEN;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(BAR_X,barTop,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    const now=performance.now()/1000;
    for(let ring=0;ring<3;ring++){
      const phase=((now*1.4)+ring*0.33)%1;
      const ringR=4+phase*22,ringA=(1-phase)*0.45*lineAlpha*ballAlpha;
      if(ringA<=0)continue;
      ctx.save();ctx.globalAlpha=ringA;ctx.strokeStyle=GREEN;ctx.lineWidth=1;
      ctx.shadowColor=GREEN;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(BAR_X,barTop,ringR,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.restore();
    }
  }
  ctx.restore();
}

function drawFirework(p, cx, cy){
  if(p<=0||p>=1) return;
  ctx.save();
  const flashA = Math.max(0, 1-p*6);
  if(flashA>0){
    const fg=ctx.createRadialGradient(cx,cy,0,cx,cy,32);
    fg.addColorStop(0,`rgba(255,255,255,${flashA})`);
    fg.addColorStop(0.4,`rgba(180,255,200,${flashA*0.6})`);
    fg.addColorStop(1,'rgba(26,138,58,0)');
    ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(cx,cy,32,0,Math.PI*2); ctx.fill();
  }
  const r1 = p * 130;
  const a1 = Math.max(0, 1-p*1.3) * 0.9;
  if(a1>0){
    ctx.globalAlpha = a1;
    ctx.strokeStyle = GREEN;
    ctx.lineWidth   = 4;
    ctx.shadowColor = GREEN; ctx.shadowBlur = 18;
    ctx.beginPath(); ctx.arc(cx, cy, Math.max(1,r1), 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur  = 0;
  }
  const p2 = Math.max(0, p-0.1);
  const r2 = p2 * 110;
  const a2 = Math.max(0, 1-p2*1.6) * 0.5;
  if(a2>0 && r2>0){
    ctx.globalAlpha = a2;
    ctx.strokeStyle = GREEN;
    ctx.lineWidth   = 2;
    ctx.shadowColor = GREEN; ctx.shadowBlur = 8;
    ctx.beginPath(); ctx.arc(cx, cy, r2, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur  = 0;
  }
  ctx.restore();
}

function drawCheckeredAura(lineProgress,lineAlpha){
  if(lineProgress<=0||lineAlpha<=0)return;
  const steps=300,drawn=Math.floor(steps*lineProgress);
  const tipXF=drawn/steps,tipX=28+tipXF*(W-72),tipY=sy(tipXF);
  ctx.save();
  const cellSize=20,offX=(tipX*0.5)%cellSize,offY=(tipY*0.5)%cellSize;
  ctx.strokeStyle='rgba(26,138,58,1)';ctx.lineWidth=0.4;
  for(let x=-offX;x<W;x+=cellSize){const d=Math.abs(x-tipX);const fade=Math.max(0,1-d/160);ctx.globalAlpha=fade*0.07*lineAlpha;ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=-offY;y<H;y+=cellSize){const d=Math.abs(y-tipY);const fade=Math.max(0,1-d/160);ctx.globalAlpha=fade*0.07*lineAlpha;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  for(let x=-offX;x<W;x+=cellSize){for(let y=-offY;y<H;y+=cellSize){const dist=Math.hypot(x-tipX,y-tipY);if(dist<100){const fade=Math.max(0,1-dist/100);ctx.globalAlpha=fade*0.15*lineAlpha;ctx.fillStyle='rgba(26,138,58,1)';ctx.beginPath();ctx.arc(x,y,1,0,Math.PI*2);ctx.fill();}}}
  ctx.globalAlpha=1;ctx.restore();
}

function fadeTxt(text,cx,cy,alpha,size,col,weight){
  if(alpha<=0)return;
  ctx.save();ctx.globalAlpha=Math.min(alpha,1);ctx.fillStyle=col||INK_DIM;
  ctx.font=`${weight||400} ${size}px ${HN}`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,cx,cy);ctx.restore();
}
function drawRule(cx,y,w,p){
  if(p<=0)return;ctx.save();ctx.strokeStyle=INK_DIM;ctx.lineWidth=0.7;
  ctx.globalAlpha=Math.min(p*2,1)*0.35;ctx.beginPath();ctx.moveTo(cx-w/2,y);ctx.lineTo(cx-w/2+w*Math.min(p*1.5,1),y);ctx.stroke();ctx.restore();
}
function check(cx,cy,size,p){
  if(p<=0)return;ctx.save();ctx.strokeStyle=GREEN;ctx.lineWidth=size*0.13;
  ctx.lineCap='round';ctx.lineJoin='round';ctx.shadowColor=GREEN;ctx.shadowBlur=8;
  const p1=Math.min(p/0.4,1),p2=Math.max((p-0.4)/0.6,0);
  const lx=cx-size*0.28,ly=cy,mx=cx-size*0.02,my=cy+size*0.32,rx=cx+size*0.44,ry=cy-size*0.28;
  ctx.globalAlpha=Math.min(p*3,1);
  if(p1>0){ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(lx+(mx-lx)*p1,ly+(my-ly)*p1);ctx.stroke();}
  if(p2>0){ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(mx+(rx-mx)*p2,my+(ry-my)*p2);ctx.stroke();}
  ctx.shadowBlur=0;ctx.restore();
}

function drawWord(text,cx,cy,alpha,size,hlFirst,hlCol){
  if(alpha<=0)return;
  ctx.save();ctx.textBaseline='middle';ctx.textAlign='left';ctx.globalAlpha=Math.min(alpha,1);
  ctx.font=`700 ${size}px ${HN}`;const fw=ctx.measureText(text).width;let x=cx-fw/2;
  text.split('').forEach((ch,i)=>{
    ctx.font=`700 ${size}px ${HN}`;const isHL=(i===0&&hlFirst);
    ctx.fillStyle=isHL?(hlCol||GREEN):INK_MID;
    if(isHL){ctx.shadowColor=hlCol||GREEN;ctx.shadowBlur=8;}
    ctx.fillText(ch,x,cy);ctx.shadowBlur=0;x+=ctx.measureText(ch).width;
  });ctx.restore();
}

function drawTransformLetter(ch,srcX,srcY,srcSize,tgtX,tgtY,tgtSize,p,srcCol,tgtCol){
  if(p<0)return;const ep=eio(Math.min(p,1));
  const x=lerp(srcX,tgtX,ep),y=lerp(srcY,tgtY,ep),size=lerp(srcSize,tgtSize,ep);
  ctx.save();ctx.globalAlpha=0.5+ep*0.5;
  ctx.fillStyle=ep>0.5?tgtCol:srcCol;
  if(ep>0.5){ctx.shadowColor=tgtCol;ctx.shadowBlur=ep*14;}
  ctx.font=`700 ${size}px ${HN}`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(ch,x,y);ctx.shadowBlur=0;ctx.restore();
}

function render(ts){
  if(!startTime)startTime=ts;
  const t=(ts-startTime)/1000;
  const TOTAL=15;
  document.getElementById('pb').style.width=Math.min(t/TOTAL*100,100)+'%';
  drawBG();
  const lineP=eo(pr(t,0.3,8.0));
  const lineA=Math.max(0,1-eo(pr(t,9.0,11.0)));
  drawCheckeredAura(lineP,lineA);
  drawLine(lineP,lineA);
  drawRisingBar(lineP,lineA);

  const steps_fw=300,drawn_fw=Math.floor(steps_fw*Math.min(lineP,1));
  const tipXF_fw=drawn_fw/steps_fw;
  const pencilTipX_fw=28+tipXF_fw*(W-72);
  const pencilTipY_fw=sy(tipXF_fw);
  if(!window._fireT&&Math.abs(pencilTipX_fw-BAR_X)<4)window._fireT=t;
  if(window._fireT){const fp=(t-window._fireT)/1.4;if(fp>=0&&fp<1)drawFirework(fp,BAR_X,pencilTipY_fw);}

  if(lineP>0.08&&lineA>0)fadeTxt('$2.91',44,sy(0.02)+22,Math.min(lineP/0.15,1)*0.9*lineA,18,GREEN,700);
  if(lineP>0.78&&lineA>0)fadeTxt('+248%',W-78,sy(0.77)-52,eo(pr(lineP,0.78,0.95))*lineA,18,GREEN,700);

  const tA=eo(pr(t,8.2,9.2)),tI1=eo(pr(t,8.4,9.4)),tI2=eo(pr(t,8.6,9.6));
  const transforming=t>8.0,transformed=tA>=1&&tI1>=1&&tI2>=1;
  const w1p=pr(t,1.8,3.0),w2p=pr(t,3.3,4.5),w3p=pr(t,5.0,6.2);
  const aLit=t>6.8,i1Lit=t>7.2,i2Lit=t>7.6;

  if(!transforming){
    if(w1p>0){ctx.save();ctx.font=`700 ${WORD_SIZE}px ${HN}`;const fw1=ctx.measureText('Augmented').width;ctx.beginPath();ctx.rect(CX-fw1/2-2,wordY1-WORD_SIZE*0.65,fw1*Math.min(pr(t,1.8,3.0)*1.3,1)+4,WORD_SIZE*1.3);ctx.clip();drawWord('Augmented',CX,wordY1,1,WORD_SIZE,aLit,GREEN);ctx.restore();}
    if(w2p>0){ctx.save();ctx.font=`700 ${WORD_SIZE}px ${HN}`;const fw2=ctx.measureText('Investor').width;ctx.beginPath();ctx.rect(CX-fw2/2-2,wordY2-WORD_SIZE*0.65,fw2*Math.min(w2p*1.3,1)+4,WORD_SIZE*1.3);ctx.clip();drawWord('Investor',CX,wordY2,1,WORD_SIZE,i1Lit,GREEN);ctx.restore();}
    if(w3p>0){ctx.save();ctx.font=`700 ${WORD_SIZE}px ${HN}`;const fw3=ctx.measureText('Intelligence').width;ctx.beginPath();ctx.rect(CX-fw3/2-2,wordY3-WORD_SIZE*0.65,fw3*Math.min(w3p*1.3,1)+4,WORD_SIZE*1.3);ctx.clip();drawWord('Intelligence',CX,wordY3,1,WORD_SIZE,i2Lit,GREEN);ctx.restore();}
    drawRule(CX,wordY1+28,220,pr(t,3.0,3.5));drawRule(CX,wordY2+28,220,pr(t,4.5,5.0));drawRule(CX,wordY3+28,220,pr(t,6.2,6.7));
  }

  if(transforming&&!transformed){
    const wf=Math.max(0,1-eo(pr(t,8.0,8.8)));
    if(wf>0){
      ctx.save();ctx.globalAlpha=wf;ctx.font=`700 ${WORD_SIZE}px ${HN}`;ctx.fillStyle=INK_MID;ctx.textBaseline='middle';ctx.textAlign='left';
      const fw1=ctx.measureText('Augmented').width;ctx.fillText('ugmented',CX-fw1/2+ctx.measureText('A').width,wordY1);
      const fw2=ctx.measureText('Investor').width;ctx.fillText('nvestor',CX-fw2/2+ctx.measureText('I').width,wordY2);
      const fw3=ctx.measureText('Intelligence').width;ctx.fillText('ntelligence',CX-fw3/2+ctx.measureText('I').width,wordY3);
      ctx.restore();
    }
    if(tA<1){ctx.font=`700 ${WORD_SIZE}px ${HN}`;const fw1=ctx.measureText('Augmented').width;drawTransformLetter('A',CX-fw1/2+ctx.measureText('A').width*0.5,wordY1,WORD_SIZE,TARGET_A.x,TARGET_A.y,TARGET_A.size,tA,INK_MID,INK);}
    if(tI1<1){ctx.font=`700 ${WORD_SIZE}px ${HN}`;const fw2=ctx.measureText('Investor').width;drawTransformLetter('I',CX-fw2/2+ctx.measureText('I').width*0.5,wordY2,WORD_SIZE,TARGET_I1.x,TARGET_I1.y,TARGET_I1.size,tI1,INK_MID,INK);}
    if(tI2<1){ctx.font=`700 ${WORD_SIZE}px ${HN}`;const fw3=ctx.measureText('Intelligence').width;drawTransformLetter('²',CX-fw3/2+ctx.measureText('I').width*0.5,wordY3,WORD_SIZE,TARGET_I2.x,TARGET_I2.y,TARGET_I2.size,tI2,INK_MID,GREEN);}
  }

  if(transformed){
    const MEET_T=8.2,LOGO_T=8.8;
    const ai2A=Math.max(0,1-eo(pr(t,MEET_T,MEET_T+0.4)));
    if(ai2A>0){
      ctx.save();ctx.globalAlpha=ai2A;ctx.fillStyle=INK;ctx.font=`700 ${LOGO_SIZE}px ${HN}`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('AI',LOGO_CX-16,LOGO_CY);
      ctx.fillStyle=GREEN;ctx.font=`700 ${SUP_SIZE}px ${HN}`;ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('²',LOGO_CX+46,LOGO_CY-60);ctx.restore();
      check(LOGO_CX+88,LOGO_CY-58,28,eo(pr(t,9.5,10.0)));
    }
    if(t>=LOGO_T){
      const logoA=eo(pr(t,LOGO_T,LOGO_T+0.7));
      const tagA=eo(pr(t,LOGO_T+0.8,LOGO_T+1.6));
      ctx.save();ctx.globalAlpha=logoA;
      ctx.fillStyle=INK;ctx.font=`700 46px ${HN}`;ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.shadowColor=GREEN;ctx.shadowBlur=20*logoA;ctx.fillText('K1LADEX',CX,H*0.44);ctx.shadowBlur=0;
      ctx.globalAlpha=logoA*0.7;ctx.fillStyle=GREEN;ctx.font=`500 13px ${HN}`;
      ctx.fillText('INTELLIGENCE FRAMEWORK',CX,H*0.44+34);ctx.restore();
      if(tagA>0)fadeTxt("Finally know what you're doing.",CX,H*0.44+62,tagA*0.85,16,INK_MID,400);
      if(t>LOGO_T+2.2){
        const promptA=eo(pr(t,LOGO_T+2.2,LOGO_T+3.0));
        fadeTxt('▼  Try a stock below',CX,H*0.44+100,promptA*0.7,13,GREEN,600);
        if(promptA>0.8) showTickerInput();
      }
    }
  }

  if(t<TOTAL) raf=requestAnimationFrame(render);
}

let tickerShown=false;
function showTickerInput(){
  if(tickerShown)return;
  tickerShown=true;
  document.getElementById('tickerOverlay').classList.add('visible');
  setTimeout(()=>document.getElementById('tickerInput').focus(),300);
}

// ─── SCORE DISPLAY ────────────────────────────────────────────
const sc_el=document.getElementById('sc');
const sc=sc_el.getContext('2d');
let scoreRaf=null,scoreStart=null;

function scRoundRect(x,y,w,h,r){
  sc.beginPath();
  sc.moveTo(x+r,y);sc.lineTo(x+w-r,y);sc.quadraticCurveTo(x+w,y,x+w,y+r);
  sc.lineTo(x+w,y+h-r);sc.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  sc.lineTo(x+r,y+h);sc.quadraticCurveTo(x,y+h,x,y+h-r);
  sc.lineTo(x,y+r);sc.quadraticCurveTo(x,y,x+r,y);
  sc.closePath();
}

function drawScoreScreen(ticker,data,t){
  const eop=(s,e)=>Math.max(0,Math.min(1,(t-s)/(e-s)));
  const eeo=(v)=>1-Math.pow(1-v,3);

  const grad=sc.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,BG_TOP);grad.addColorStop(1,BG_BOT);
  sc.fillStyle=grad;sc.fillRect(0,0,W,H);
  sc.strokeStyle=RULE;sc.lineWidth=0.5;
  for(let y=0;y<H;y+=40){sc.beginPath();sc.moveTo(0,y);sc.lineTo(W,y);sc.stroke();}

  // ── HEADER: ticker symbol large, company name smaller below ──
  // FIX: ticker.toUpperCase() shows ticker, data.name shows company name separately
  const h1=eeo(eop(0,0.4));
  sc.save();sc.globalAlpha=h1;
  sc.fillStyle=INK;sc.font=`700 34px ${HN}`;sc.textAlign='left';sc.textBaseline='middle';
  sc.fillText(ticker.toUpperCase(),22,46);
  sc.fillStyle=INK_DIM;sc.font=`400 12px ${HN}`;
  sc.fillText(data.name,22,66);  // company name only — not "TICKER Company Name"
  const priceCol=data.change.startsWith('-')?'#cc2200':GREEN;
  sc.fillStyle=priceCol;sc.font=`700 16px ${HN}`;sc.textAlign='right';
  sc.fillText(data.price,W-22,46);
  sc.font=`400 12px ${HN}`;
  sc.fillText(data.change,W-22,66);
  sc.restore();

  const recA=eeo(eop(0.2,0.7));
  if(recA>0){
    sc.save();sc.globalAlpha=recA;
    const recCol=data.rec==='BUY'?'#1a8a3a':data.rec==='HOLD'?'#886600':'#cc4400';
    const recBg=data.rec==='BUY'?'rgba(26,138,58,0.12)':data.rec==='HOLD'?'rgba(136,102,0,0.12)':'rgba(204,68,0,0.12)';
    sc.fillStyle=recBg;scRoundRect(22,82,W-44,38,8);sc.fill();
    sc.strokeStyle=recCol;sc.lineWidth=1.5;scRoundRect(22,82,W-44,38,8);sc.stroke();
    sc.fillStyle=recCol;sc.font=`700 18px ${HN}`;sc.textAlign='left';sc.textBaseline='middle';
    sc.fillText(data.rec,36,101);
    sc.fillStyle=INK_MID;sc.font=`600 11px ${HN}`;sc.textAlign='right';
    sc.fillText(data.verdict,W-36,101);
    sc.restore();
  }

  const lineA=eeo(eop(0.4,1.2));
  if(lineA>0){
    sc.save();sc.globalAlpha=lineA;
    const lTop=130,lBot=178,lLeft=22,lRight=W-22;
    sc.fillStyle='rgba(26,138,58,0.04)';sc.fillRect(lLeft,lTop,lRight-lLeft,lBot-lTop);
    const lp=eeo(eop(0.5,1.8));
    const pts=100,drawn=Math.floor(pts*lp);
    if(drawn>1){
      sc.strokeStyle=GREEN;sc.lineWidth=2;sc.lineCap='round';sc.lineJoin='round';
      sc.shadowColor=GREEN;sc.shadowBlur=4;
      sc.beginPath();
      for(let i=0;i<=drawn;i++){
        const xf=i/pts;
        const x=lLeft+xf*(lRight-lLeft);
        const y=lBot-(surgeY(xf)-(1-((lBot-lTop)/H)))*(lBot-lTop)*3.2;
        const yc=Math.max(lTop,Math.min(lBot,y));
        i===0?sc.moveTo(x,yc):sc.lineTo(x,yc);
      }
      sc.stroke();sc.shadowBlur=0;
    }
    sc.fillStyle=GREEN;sc.font=`700 11px ${HN}`;sc.textAlign='left';sc.textBaseline='middle';
    sc.fillText(data.surge,lRight+2,lTop+8);
    sc.fillStyle=INK_DIM;sc.font=`400 10px ${HN}`;sc.textAlign='left';
    sc.fillText('52W PATTERN',lLeft,lBot+12);
    sc.restore();
  }

  const labels=['S','I','G','N','A','L','+'];
  const vals=[data.s,data.i,data.g,data.n,data.a,data.l,data.plus];
  const names=['Surge 200%+','In Consolidation','Growth Confirmed','No Red Flags','Catalyst Dated','Levels & Macro','Vol + Short'];
  const startY=200;const rowH=32;

  labels.forEach((lbl,i)=>{
    const rowA=eeo(eop(0.6+i*0.1,1.0+i*0.1));
    if(rowA<=0)return;
    sc.save();sc.globalAlpha=rowA;
    const y=startY+i*rowH;
    const val=vals[i];
    const col=val>=1.5?GREEN:val>=1.0?'#886600':'#cc4400';
    sc.fillStyle=col;sc.font=`700 13px ${HN}`;sc.textAlign='left';sc.textBaseline='middle';
    sc.fillText(lbl,22,y);
    sc.fillStyle=INK_MID;sc.font=`400 11px ${HN}`;
    sc.fillText(names[i],40,y);
    const barW=52,barX=W-82,barFill=barW*(val/1.5);
    sc.fillStyle='rgba(0,0,0,0.06)';scRoundRect(barX,y-6,barW,12,3);sc.fill();
    if(barFill>0){sc.fillStyle=col;scRoundRect(barX,y-6,barFill,12,3);sc.fill();}
    sc.fillStyle=col;sc.font=`700 11px ${HN}`;sc.textAlign='right';
    sc.fillText(val.toFixed(1),W-20,y);
    if(val>=1.0){
      const ck=eeo(eop(0.8+i*0.08,1.1+i*0.08));
      if(ck>0){
        sc.strokeStyle=GREEN;sc.lineWidth=1.5;sc.lineCap='round';sc.lineJoin='round';
        sc.globalAlpha=rowA*ck;
        sc.beginPath();sc.moveTo(30,y-3);sc.lineTo(33,y+1);sc.lineTo(38,y-5);sc.stroke();
      }
    }
    sc.restore();
  });

  const divY=startY+7*rowH+4;
  sc.save();sc.globalAlpha=eeo(eop(1.6,2.0))*0.25;
  sc.strokeStyle=INK_DIM;sc.lineWidth=0.7;
  sc.beginPath();sc.moveTo(20,divY);sc.lineTo(W-20,divY);sc.stroke();sc.restore();

  const scoreA=eeo(eop(1.7,2.2));
  if(scoreA>0){
    sc.save();sc.globalAlpha=scoreA;
    const sy2=divY+22;
    sc.fillStyle=data.col;sc.font=`700 44px ${HN}`;sc.textAlign='left';sc.textBaseline='middle';
    sc.shadowColor=data.col;sc.shadowBlur=14*scoreA;
    sc.fillText(data.score,22,sy2);sc.shadowBlur=0;
    sc.fillStyle=INK_DIM;sc.font=`400 18px ${HN}`;
    sc.fillText('/10',22+sc.measureText(String(data.score)).width+3,sy2+4);
    const dgX=130,dgY=sy2-18,dgRowH=20;
    const dataRows=[
      ['Short Interest', data.short],
      ['Float',          data.float],
      ['Revenue',        data.revenue],
      ['Earnings',       data.earnings],
    ];
    dataRows.forEach(([label,val],i)=>{
      const dy=dgY+i*dgRowH;
      sc.fillStyle=INK_DIM;sc.font=`400 10px ${HN}`;sc.textAlign='left';
      sc.fillText(label,dgX,dy);
      sc.fillStyle=INK;sc.font=`600 11px ${HN}`;
      sc.fillText(val,dgX,dy+12);
    });
    sc.restore();
  }

  const ctaA=eeo(eop(2.4,3.0));
  if(ctaA>0){
    sc.save();sc.globalAlpha=ctaA*0.25;
    sc.strokeStyle=INK_DIM;sc.lineWidth=0.7;
    sc.beginPath();sc.moveTo(20,H-160);sc.lineTo(W-20,H-160);sc.stroke();
    sc.restore();
    document.getElementById('ctaRow').style.opacity=ctaA;
    document.getElementById('reportBtn').style.opacity=ctaA;
    document.querySelector('.cta-share').style.opacity=ctaA;
  } else {
    document.getElementById('ctaRow').style.opacity=0;
    document.querySelector('.cta-share').style.opacity=0;
  }
}

function runScoreAnimation(ticker,data){
  scoreStart=null;
  if(scoreRaf)cancelAnimationFrame(scoreRaf);
  function loop(ts){
    if(!scoreStart)scoreStart=ts;
    const t=(ts-scoreStart)/1000;
    drawScoreScreen(ticker,data,t);
    if(t<4.5) scoreRaf=requestAnimationFrame(loop);
    else scoreRaf=requestAnimationFrame(()=>{drawScoreScreen(ticker,data,4.5);});
  }
  scoreRaf=requestAnimationFrame(loop);
}

let scansUsed = 0;
const FREE_SCANS = 3;

function updateScanLabel(){
  const remaining = Math.max(0, FREE_SCANS - scansUsed);
  document.querySelector('.free-label').textContent =
    remaining > 0 ? `${remaining} FREE SCAN${remaining===1?'':'S'} REMAINING` : 'FREE SCANS USED — $6.99/mo for unlimited';
  document.querySelector('.cta-share').textContent =
    `Share this score · ${remaining} free scan${remaining===1?'':'s'} remaining`;
}

  document.getElementById('paywallOverlay').classList.add('visible');
}

// ─── GO BUTTON — with live data fetch for unknown tickers ─────
let currentTicker = '';
let currentData   = null;

document.getElementById('goBtn').addEventListener('click', async () => {
  const ticker = document.getElementById('tickerInput').value.trim().toUpperCase();
  if(!ticker) return;
  if(scansUsed >= FREE_SCANS){ showPaywall(); return; }
  scansUsed++;
  updateScanLabel();

  const isKnown = !!KNOWN[ticker];
  let data = scoreFromTicker(ticker);
  currentTicker = ticker;

  if (isKnown) {
    // Known ticker — go straight to score
    currentData = data;
    document.getElementById('scoreOverlay').classList.add('visible');
    runScoreAnimation(ticker, data);
  } else {
    // Unknown ticker — show loading, fetch live name + price
    document.getElementById('loadingTicker').textContent = ticker;
    document.getElementById('loadingCompany').textContent = 'Looking up live data...';
    document.getElementById('loadingOverlay').classList.add('visible');

    const live = await fetchLiveStockData(ticker);
    if (live) {
      data = { ...data, name: live.name, price: live.price, change: live.change };
    } else {
      // Fallback if fetch fails
      data = { ...data, name: ticker, price: 'N/A', change: '—' };
    }
    currentData = data;

    document.getElementById('loadingOverlay').classList.remove('visible');
    document.getElementById('scoreOverlay').classList.add('visible');
    runScoreAnimation(ticker, data);
  }
});

document.getElementById('tickerInput').addEventListener('keydown',(e)=>{
  if(e.key==='Enter') document.getElementById('goBtn').click();
});

    {letter:'I',name:'CONSOLIDATION ANALYSIS',score:vals[1],headline:'Is the stock holding its gains or bleeding out?',why:'After a surge, the stock must consolidate within 30% of its highs in a tight sideways range. A bleeding consolidation is a failing thesis. A tight sideways range is coiled energy.',what:`${ticker.toUpperCase()} is currently ${vals[1]>=1.5?'in a tight consolidation within 30% of its 52-week high — a textbook coiling pattern.':vals[1]>=1.0?'holding gains but showing some weakness.':'showing signs of deterioration.'}`,metric1:['Consolidation Quality',vals[1]>=1.5?'Tight':'Loose'],metric2:['Distance from High',vals[1]>=1.5?'< 15%':'> 25%'],metric3:['Pattern','Sideways base'],note:'A tight range under low volume is the setup. Volume should drop during consolidation and spike on breakout.'},
    {letter:'G',name:'GROWTH ANALYSIS',score:vals[2],headline:'Is there a real business behind this stock?',why:'Revenue must be growing year-over-year. Guidance must be maintained or raised — never cut. Cash on hand must be sufficient so the company is not forced to raise at the wrong time.',what:`${ticker.toUpperCase()} shows ${vals[2]>=1.5?'strong confirmed growth with revenue trending up and guidance intact.':vals[2]>=1.0?'moderate growth signals. Revenue is moving in the right direction.':'weak growth fundamentals. Revenue and guidance require close monitoring.'} Revenue: ${data.revenue}. Next earnings: ${data.earnings}.`,metric1:['Revenue',data.revenue],metric2:['Earnings Date',data.earnings],metric3:['Guidance','Maintained'],note:'The K1LADEX G-checkpoint requires positive YoY revenue growth. Guidance cuts are automatic red flags.'},
    {letter:'N',name:'RED FLAGS ANALYSIS',score:vals[3],headline:'What does the fine print say?',why:'The Ripple Fine Print Principle: ignoring the footnotes sends rippling effects through the portfolio. Before any entry, check dilution, insider activity, reverse splits, SEC investigations, and legal exposure.',what:`${ticker.toUpperCase()} ${vals[3]>=1.5?'passes all N-checkpoint criteria. No significant dilution, no insider red flags, no legal exposure identified.':vals[3]>=1.0?'passes most N-checkpoint criteria with minor cautions noted.':'shows one or more red flags. Review dilution history, insider transactions, and legal filings before entry.'}`,metric1:['Dilution Check',vals[3]>=1.5?'Clean':'Monitor'],metric2:['Insider Activity',vals[3]>=1.5?'Neutral/Buying':'Mixed'],metric3:['Legal/SEC',vals[3]>=1.5?'Clear':'Check filings'],note:'SMCI Rule: always search "[TICKER] SEC investigation lawsuit DOJ short seller" before scoring N.'},
    {letter:'A',name:'CATALYST ANALYSIS',score:vals[4],headline:'Is there a dated event on the calendar?',why:'A vague thesis is not a catalyst. A catalyst must be a specific, dated event — earnings, FDA decision, contract announcement, partnership, or product launch.',what:`${ticker.toUpperCase()} ${vals[4]>=1.5?`has a confirmed dated catalyst on the calendar. Next earnings: ${data.earnings}. This is a specific, actionable event.`:vals[4]>=1.0?`has a potential catalyst approaching. Next known date: ${data.earnings}.`:`lacks a near-term dated catalyst. The thesis may be structural but without a date to trade against, timing is speculative.`}`,metric1:['Next Catalyst',data.earnings],metric2:['Catalyst Type','Earnings / Corporate'],metric3:['Confidence',vals[4]>=1.5?'High':'Moderate'],note:'K1LADEX requires a dated catalyst. "Growth potential" is not a catalyst. A calendar event is.'},
    {letter:'L',name:'LEVELS & MACRO ANALYSIS',score:vals[5],headline:'Does the chart and macro environment support entry?',why:'Support and resistance must be clearly defined. A stop loss must be identifiable. The sector must be aligned with the macro environment.',what:`${ticker.toUpperCase()} ${vals[5]>=1.5?'has clearly defined technical levels with identifiable support and stop loss zones. Macro sector alignment is confirmed.':vals[5]>=1.0?'has reasonable technical structure. Macro environment is neutral to supportive for this sector.':'shows weak technical definition or macro headwinds.'}`,metric1:['Technical Structure',vals[5]>=1.5?'Defined':'Developing'],metric2:['Macro Alignment',vals[5]>=1.5?'Confirmed':'Neutral'],metric3:['Stop Loss Zone','Identifiable'],note:'Never enter without a stop loss. If you cannot define the stop, you cannot define the risk.'},
    {letter:'+',name:'VOLUME & SHORT PRESSURE ANALYSIS',score:vals[6],headline:'Is volume and short interest confirming the setup?',why:'Volume must drop during consolidation and spike on breakout. High short interest is fuel — forced covering accelerates moves. A tight float is the accelerant.',what:`${ticker.toUpperCase()} shows ${data.short} short interest with a float of ${data.float}. ${parseFloat(data.short)>20?'This is elevated short interest — significant short squeeze fuel is present.':'Short interest is moderate.'} ${parseFloat(data.float)<50?'The tight float creates velocity potential on any breakout.':'Monitor float velocity as a key acceleration factor.'}`,metric1:['Short Interest',data.short],metric2:['Float',data.float],metric3:['Squeeze Potential',parseFloat(data.short)>20?'High':'Moderate'],note:'Float Velocity Rule: float over 100M shares = automatic watchlist demotion. Float is the accelerant.'},
  ];

  checkpointData.forEach((cp,idx)=>{
    doc.addPage(); header(idx+4); footer(); y=80;
    const cpCol=cp.score>=1.5?[26,138,58]:cp.score>=1.0?[136,102,0]:[204,68,0];
    doc.setFillColor(10,22,40); doc.rect(M,y,CW,70,'F');
    doc.setFillColor(...cpCol); doc.rect(M,y,6,70,'F');
    doc.setTextColor(...cpCol); doc.setFont('helvetica','bold'); doc.setFontSize(36); doc.text(cp.letter,M+20,y+50);
    doc.setTextColor(255,255,255); doc.setFontSize(16); doc.text(cp.name,M+60,y+32);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(180,200,220); doc.text(cp.headline,M+60,y+52);
    doc.setFillColor(...cpCol); doc.rect(pw-M-70,y+14,62,42,'F');
    doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(24); doc.text(cp.score.toFixed(1),pw-M-39,y+44,{align:'center'});
    y+=88;
    y=sectionTitle(y,'WHY THIS MATTERS');
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(22,48,88);
    const whyLines=doc.splitTextToSize(cp.why,CW); doc.text(whyLines,M,y); y+=whyLines.length*14+16;
    y=sectionTitle(y,`WHAT WE FOUND FOR ${ticker.toUpperCase()}`);
    const whatLines=doc.splitTextToSize(cp.what,CW-20); const whatH=whatLines.length*14+20;
    doc.setFillColor(245,252,248); doc.rect(M,y,CW,whatH,'F');
    doc.setDrawColor(...cpCol); doc.setLineWidth(1.5); doc.line(M,y,M,y+whatH);
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(10,22,40); doc.text(whatLines,M+12,y+14);
    y+=whatH+20;
    y=sectionTitle(y,'CHECKPOINT SCORE');
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...cpCol); doc.text(`${cp.score.toFixed(1)} / 1.5`,M,y+16);
    scoreBar(M+80,y+6,CW-90,18,cp.score,1.5,cpCol);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(74,104,136); doc.text(`${Math.round((cp.score/1.5)*100)}% of maximum`,pw-M,y+18,{align:'right'});
    y+=38;
    y=sectionTitle(y,'DATA POINTS');
    [[cp.metric1,cp.metric2],[cp.metric3,['Checkpoint Weight','1.5 pts max']]].forEach(([m1,m2],ri)=>{
      const ry=y+ri*38; doc.setFillColor(ri%2===0?248:255,ri%2===0?251:255,ri%2===0?255:255); doc.rect(M,ry,CW,38,'F');
      doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(74,104,136);
      doc.text(m1[0],M+8,ry+13); doc.text(m2[0],M+CW/2+8,ry+13);
      doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(10,22,40);
      doc.text(m1[1],M+8,ry+28); doc.text(m2[1],M+CW/2+8,ry+28);
      doc.setDrawColor(220,228,240); doc.setLineWidth(0.3); doc.line(M,ry+38,M+CW,ry+38); doc.line(M+CW/2,ry,M+CW/2,ry+38);
    });
    y+=76+16;
    doc.setFillColor(250,245,230);
    const noteLines=doc.splitTextToSize(`K1LADEX NOTE: ${cp.note}`,CW-24); const noteH=noteLines.length*13+16;
    doc.rect(M,y,CW,noteH,'F'); doc.setDrawColor(180,140,0); doc.setLineWidth(1); doc.line(M,y,M,y+noteH);
    doc.setFont('helvetica','italic'); doc.setFontSize(8.5); doc.setTextColor(100,70,0); doc.text(noteLines,M+12,y+12);
  });

  // PAGE 11 VERDICT
  doc.addPage(); header(11); footer(); y=80;
  y=sectionTitle(y,'FINAL VERDICT & RECOMMENDATION');
  doc.setFillColor(10,22,40); doc.rect(M,y,CW,110,'F');
  doc.setFillColor(...recCol); doc.rect(M,y,CW,4,'F'); doc.rect(M,y+106,CW,4,'F');
  doc.setTextColor(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(48); doc.text(data.rec,M+20,y+72);
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(180,200,220); doc.text(data.verdict,M+20,y+92);
  doc.setFont('helvetica','bold'); doc.setFontSize(22); doc.setTextColor(...recCol.map(v=>Math.min(v+100,255))); doc.text(`${data.score}/10`,pw-M-20,y+72,{align:'right'});
  y+=128;
  y=sectionTitle(y,'SIGNAL+ BREAKDOWN SUMMARY');
  labels.forEach((lbl,i)=>{
    const col=vals[i]>=1.5?[26,138,58]:vals[i]>=1.0?[136,102,0]:[204,68,0]; const ry=y+i*28;
    doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(...col); doc.text(lbl,M+4,ry+17);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(22,48,88); doc.text(fullNames[i],M+22,ry+17);
    scoreBar(pw-M-140,ry+7,120,12,vals[i],1.5,col);
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...col); doc.text(vals[i].toFixed(1),pw-M,ry+17,{align:'right'});
    doc.setDrawColor(220,228,240); doc.setLineWidth(0.2); doc.line(M,ry+28,M+CW,ry+28);
  });
  y+=labels.length*28+16;
  y=sectionTitle(y,'K1LADEX CORE PRINCIPLES APPLIED');
  ['Levi Strauss — We bet on infrastructure, not the gold rush.','Ahab — Loss aversion is chasing the whale. We avoid it.','Ripple Fine Print — The market reads the headline. We read the footnotes.','Float Velocity — Float is the accelerant. Large float = barge, not speedboat.','Dead Money Rule — If the thesis stalls, cut and redeploy.'].forEach((p,i)=>{
    doc.setFillColor(i%2===0?248:255,i%2===0?251:255,i%2===0?255:255); doc.rect(M,y+i*24,CW,24,'F');
    doc.setDrawColor(26,138,58); doc.setLineWidth(1.5); doc.line(M,y+i*24,M,y+i*24+24);
    doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(22,48,88); doc.text(p,M+10,y+i*24+15);
  });

  // PAGE 12 DISCLAIMER
  doc.addPage(); header(12); footer(); y=80;
  y=sectionTitle(y,'ABOUT K1LADEX');
  doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(22,48,88);
  const aboutLines=doc.splitTextToSize('K1LADEX is a proprietary investment intelligence framework that uses AI-amplified pattern recognition to find geometric market opportunities that institutional money misses, governed by behavioral discipline built from real losses and real wins, by a real person who paid attention. The K1LADEX name comes from a kaleidoscope — rotating the analytical lens on publicly available information to reveal geometric patterns the market misses. The "1" replaces the "I" representing binary code and the AI era of investing.',CW);
  doc.text(aboutLines,M,y); y+=aboutLines.length*14+24;
  y=sectionTitle(y,'DISCLAIMER');
  doc.setFillColor(255,245,245);
  const discLines=doc.splitTextToSize('This report is produced by K1LADEX Intelligence and is intended for informational and educational purposes only. It does not constitute financial advice, investment advice, trading advice, or any other type of advice. K1LADEX is not a registered investment advisor, broker-dealer, or financial planner. Past performance is not indicative of future results. All investments involve risk, including the possible loss of principal. You should consult with a licensed financial professional before making any investment decisions. K1LADEX, its principals, and its affiliates may hold positions in securities discussed in this report.',CW-20);
  const discH=discLines.length*12+20;
  doc.rect(M,y,CW,discH,'F'); doc.setDrawColor(204,68,0); doc.setLineWidth(1); doc.line(M,y,M,y+discH);
  doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(100,40,20); doc.text(discLines,M+12,y+12);
  y+=discH+24;
  doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.setTextColor(10,22,40); doc.text("Finally know what you're doing.",pw/2,y,{align:'center'});
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(74,104,136); doc.text('k1ladex.com',pw/2,y+18,{align:'center'});

  try {
    const pdfBlob = doc.output('blob');
    const url = URL.createObjectURL(pdfBlob);
    window.open(url, '_blank');
  } catch(e){
    doc.save(`K1LADEX_${ticker.toUpperCase()}_Report.pdf`);
  }
}

document.getElementById('reportBtn').addEventListener('click',()=>{
  if(!currentData){ alert('Run a scan first.'); return; }
  try { generateReport(currentTicker, currentData); }
  catch(e){ alert('PDF error: ' + e.message); }
});
document.getElementById('reportBtn').addEventListener('touchend',(e)=>{
  e.preventDefault();
  if(!currentData){ alert('Run a scan first.'); return; }
  try { generateReport(currentTicker, currentData); }
  catch(e){ alert('PDF error: ' + e.message); }
},{passive:false});

window.addEventListener('load',()=>{
  document.getElementById('ctaRow').style.opacity=0;
  document.getElementById('reportBtn').style.opacity=0;
  document.querySelector('.cta-share').style.opacity=0;
  setTimeout(playCommercial,400);
});
</script>
